<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试结果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei",sans-serif;
        }
        body {
            padding: 40px 20px;
            text-align: center;
            background: #FCF5E8;
        }
        .result-box {
            max-width: 420px;
            margin: 0 auto;
        }
        #resImg {
            width: 260px;
            height: auto;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        h2 {
            font-size: 24px;
            color: #222;
            margin-bottom:20px;
        }
        .btn-group{
            display:flex;
            gap:12px;
            justify-content:center;
            margin-bottom:30px;
        }
        .back-btn,.save-btn {
            padding:11px 26px;
            background:#f77835;
            border:none;
            color:#fff;
            border-radius:99px;
            font-size:16px;
            cursor:pointer;
        }
        .save-btn{
            background:#4285f4;
        }
        .desc-text{
            margin-top:50px;
            font-size:14px;
            color:#666;
            line-height:1.7;
        }
    </style>
</head>
<body>
    <div class="result-box">
        <img id="resImg" src="" alt="人格图片">
        <h2>最终人格：<span id="resName"></span></h2>
        <div class="btn-group">
            <button class="back-btn" onclick="location.href='index.html'">重新测试</button>
            <button class="save-btn" id="saveImgBtn">保存结果图</button>
        </div>
    </div>
    <div class="desc-text">
        本内容仅作趣味娱乐，所有视觉形象均为AI低多边形创作，与现实人物、网络IP无关联。
若相关权利人认为存在侵权，可联系我们，我们将在7个工作日内完成下架处理。
    </div>

<script src="js/main.js"></script>
<script>
window.onload=function(){
    const randList=JSON.parse(localStorage.getItem('fiveRandList'));
    const selIdx=Number(localStorage.getItem('userPickNum'));
    const finalName=randList[selIdx];
    const personData=personList.find(item=>item.name===finalName);
    document.getElementById('resName').innerText=finalName;
    const imgDom=document.getElementById('resImg');
    imgDom.src=personData.avatar;

    const saveBtn=document.getElementById('saveImgBtn');
    saveBtn.onclick=function(){
        let a = document.createElement('a');
        a.href = imgDom.src;
        a.download = finalName+'人格结果图';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        alert('图片已保存/开始下载，可前往相册查看');
    }
}
</script>
</body>
</html>
